<!DOCTYPE html>
<html>
<head>
    <title>QuickConvert</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <h1>Welcome</h1>
    <p>Choose the type to convert</p>

    <div class="buttons">

</div>

<script src="js/script.js"></script>
</body>
</html>
