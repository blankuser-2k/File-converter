<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickConvert</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>Welcome</h1>
    <p>Choose the type to convert</p>

    <div class="buttons">
        <button onclick="goTo('image-pdf')">Image to PDF</button>
        <button onclick="goTo('text-pdf')">Text to PDF</button>
        <button onclick="goTo('image-ppt')">Image to PPT</button>
        <button onclick="goTo('text-ppt')">Text to PPT</button>
        <button onclick="goTo('compress')">Compress Image</button>
        <button onclick="goTo('pdf-compress')">PDF Compressor</button>
        <button onclick="goTo('ppt-compress')">PPT Compressor</button>
    </div>
</div>

<script src="js/script.js"></script>
</body>
    </html>
